<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>プレミアム・マンダラ・スプレッドシート (RPG極限対応版)</title>
  
  <!-- Tailwind CSS local runtime -->
  <script src="vendor/tailwindcss.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bronze: {
              DEFAULT: '#b25e2e',
              light: '#d99066',
            },
            gold: {
              DEFAULT: '#d4af37',
              light: '#f3e5ab',
            },
            platinum: {
              DEFAULT: '#e5e4e2',
              light: '#f4f3f2',
            }
          },
          animation: {
            'spin-slow': 'spin 12s linear infinite',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'fade-in': 'fadeIn 0.2s ease-out forwards',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'scale(0.95)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            }
          }
        }
      }
    }
  </script>

  <!-- Google Fonts (Noto Sans JP & Orbitron) -->
  <link href="vendor/fonts/google-fonts.css" rel="stylesheet">

  <!-- FontAwesome Icons for RPG Vibe -->
  <link rel="stylesheet" href="vendor/fontawesome/all.min.css">

  <!-- React 18 local runtime -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>

  <!-- Canvas Confetti for Level 100 Celebrations -->
  <script src="vendor/confetti.browser.min.js"></script>

  <style>
    body {
      font-family: 'Noto Sans JP', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none; /* iOS Safariのズーム挙動を徹底ブロック */
    }
    
    .font-orbitron {
      font-family: 'Orbitron', sans-serif;
    }
    
    /* マンダラ用の絶対サイズ固定定義 */
    .mandala-board-wrapper {
      width: 1722px !important;
      height: 1212px !important;
      min-width: 1722px !important;
      min-height: 1212px !important;
      max-width: 1722px !important;
      max-height: 1212px !important;
    }

    .mandala-block-wrapper {
      width: 542px !important;
      height: 372px !important;
      min-width: 542px !important;
      min-height: 372px !important;
      max-width: 542px !important;
      max-height: 372px !important;
    }

    .mandala-cell {
      width: 170px !important;
      height: 105px !important;
      min-width: 170px !important;
      min-height: 105px !important;
      max-width: 170px !important;
      max-height: 105px !important;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s;
    }

    /* レジェンドオーロラアニメーション */
    @keyframes aurora {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animate-aurora {
      background-size: 200% 200% !important;
      animation: aurora 6s ease infinite !important;
    }

    /* ドラッグスクロール用カーソル */
    .drag-canvas {
      cursor: grab;
    }
    .drag-canvas:active {
      cursor: grabbing;
    }

    /* スクロールバーの非表示 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* 印刷用CSS */
    @media print {
      body {
        background: white !important;
        color: black !important;
      }
      .no-print {
        display: none !important;
      }
      .print-area {
        position: absolute;
        left: 0;
        top: 0;
        width: 100% !important;
        height: auto !important;
        transform-origin: top left;
        page-break-after: avoid;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body class="bg-[#070a13] text-slate-100 overflow-hidden h-screen w-screen">

  <div id="root" class="h-full w-full"></div>

  <script src="app.js"></script>
</body>
</html>
