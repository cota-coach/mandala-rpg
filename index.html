  <title>プレミアム・マンダラ・スプレッドシート (RPG極限対応版)</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bronze: {
              DEFAULT: '#b25e2e',
              light: '#d99066',
            },
            gold: {
              DEFAULT: '#d4af37',
              light: '#f3e5ab',
            },
            platinum: {
              DEFAULT: '#e5e4e2',
              light: '#f4f3f2',

            'spin-slow': 'spin 12s linear infinite',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'fade-in': 'fadeIn 0.2s ease-out forwards',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'scale(0.95)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            }
          }
        }
      }
    }
  </script>

  <!-- Google Fonts (Noto Sans JP & Orbitron) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

  <!-- FontAwesome Icons for RPG Vibe -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React 18 & Babel standalone -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin="anonymous"></script>

  <!-- Canvas Confetti for Level 100 Celebrations -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      font-family: 'Noto Sans JP', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none; /* iOS Safariのズーム挙動を徹底ブロック */
    }
    
    .font-orbitron {
      font-family: 'Orbitron', sans-serif;
    }
    
    /* マンダラ用の絶対サイズ固定定義 */
    .mandala-board-wrapper {
      width: 1722px !important;
      height: 1137px !important;
      min-width: 1722px !important;
      min-height: 1137px !important;
      max-width: 1722px !important;
      max-height: 1137px !important;
    }

    .mandala-block-wrapper {
      width: 542px !important;
      height: 347px !important;
      min-width: 542px !important;
      min-height: 347px !important;
      max-width: 542px !important;
      max-height: 347px !important;
    }

    .mandala-cell {
      width: 170px !important;
      height: 105px !important;
      min-width: 170px !important;
      min-height: 105px !important;
      max-width: 170px !important;
      max-height: 105px !important;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s;
    }

    /* レジェンドオーロラアニメーション */
    @keyframes aurora {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animate-aurora {
      background-size: 200% 200% !important;
      animation: aurora 6s ease infinite !important;
    }

    /* ドラッグスクロール用カーソル */
    .drag-canvas {
      cursor: grab;
    }
    .drag-canvas:active {
      cursor: grabbing;
    }

    /* スクロールバーの非表示 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* 印刷用CSS */
    @media print {
      body {
        background: white !important;
        color: black !important;
      }
      .no-print {
        display: none !important;
      }
      .print-area {
        position: absolute;
        left: 0;
        top: 0;
        width: 100% !important;
        height: auto !important;
        transform-origin: top left;
        page-break-after: avoid;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body class="bg-[#070a13] text-slate-100 overflow-hidden h-screen w-screen">

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // 20色のプレミアムカラーパレット（ベース色相リスト）
    const PRESET_HUES = [
      { name: "ディープコバルト", hue: 215 },
      { name: "フォレストグリーン", hue: 145 },
      { name: "バーガンディレッド", hue: 345 },

      { name: "ポイズンシアン", hue: 180 },

    // デフォルトの8領域
    const DEFAULT_BLOCK_NAMES = {
      0: "1. 知性・学習",
      1: "2. 仕事・キャリア",
      2: "3. 社会貢献・公益",
      3: "4. 心・精神性",
      4: "5. 人生の大目標",
      5: "6. 健康・身体",

      8: "9. 家族・パートナー"

    // グローバルタッチヘルパー
    const getDistance = (t1, t2) => {
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      return Math.sqrt(dx * dx + dy * dy);
    };

    const getCenter = (t1, t2) => {
      return {
        x: (t1.clientX + t2.clientX) / 2,
        y: (t1.clientY + t2.clientY) / 2
      };
    };

    // 【100%エラーフリー・極上マルチConfettiエンジン】
    const triggerConfettiShow = (isAbsoluteCenter = false) => {
      if (typeof confetti !== 'function') return;

      if (isAbsoluteCenter) {
        // 大目標平均Lv.100時のレジェンド級お祝い（左右からクロスして無限に舞い散るお祭り仕様）
        const end = Date.now() + (2 * 1000);
        const frame = () => {
          confetti({ particleCount: 6, angle: 60, spread: 55, origin: { x: 0, y: 0.8 } });
          confetti({ particleCount: 6, angle: 120, spread: 55, origin: { x: 1, y: 0.8 } });
          if (Date.now() < end) requestAnimationFrame(frame);
        };
        frame();
        return;
      }

      // 通常マスのレベル100達成：脳に最高のご褒美となるお祝いパターン。
      const randomAngle = 65 + Math.random() * 50;   
      const randomSpread = 60 + Math.random() * 40;  
      const randomX = 0.3 + Math.random() * 0.4;     

      confetti({
        particleCount: 110 + Math.floor(Math.random() * 50),
        angle: randomAngle,
        spread: randomSpread,
        velocity: 32 + Math.random() * 12,
        origin: { x: randomX, y: 0.65 }
      });
    };

    // レベルランクの称号テキスト計算
    const getRankTitle = (lvl) => {
      if (lvl === 0) return { title: "未開の種子", color: "text-slate-400", bg: "bg-slate-800" };
      if (lvl <= 30) return { title: "ブロンズ・開拓者", color: "text-amber-500", bg: "bg-amber-500/10" };
      if (lvl <= 60) return { title: "シルバー・探索者", color: "text-slate-300", bg: "bg-slate-300/10" };
      if (lvl <= 90) return { title: "ゴールド・覇者", color: "text-yellow-400", bg: "bg-yellow-400/10" };
      if (lvl <= 99) return { title: "プラチナ・マスター", color: "text-cyan-400", bg: "bg-cyan-400/10" };
      return { title: "👑レジェンド・創造主", color: "text-yellow-300 animate-pulse", bg: "bg-gradient-to-r from-yellow-500/20 to-red-500/20" };
    };

    const createInitialCells = (clean = false) => {
      const cells = {};
      
      const samples = {
        0: { // 知性・学習
          4: "リベラルアーツと\nコーチングスキルの探求",
          0: "毎月4冊 of 読書習慣", 1: "プロコーチ資格の取得", 2: "システム思考 of 勉強", 3: "哲学・歴史書を読み解く",
          5: "言語学習 of デイリー継続", 6: "メンターとの定期セッション", 7: "学んだ知見 of 図解・発信", 8: "デイリージャーナルの記入"
        },
        1: { // 仕事・キャリア
          4: "自律型組織 of 共創と\nビジネスの好循環",
          0: "ビジョン・ミッション再定義", 1: "新規プロジェクト of プロト", 2: "週1回の1on1ミーティング", 3: "権限移譲と自律サポート",
          5: "業務自動化による効率化", 6: "戦略的パートナーシップ構築", 7: "顧客フィードバック of 高速循環", 8: "リーダーシップ研修の開催"
        },
        2: { // 社会貢献・公益
          4: "地域コミュニティ活性化と\n公益への持続的還元",
          0: "地域公益活動への積極参画", 1: "自律コミュニティの立ち上げ", 2: "異業種ネットワーキング", 3: "若手世代の自立伴走メンター",
          5: "活動拠点的スペース提供", 6: "チャリティプロジェクト企画", 7: "地元イベントの企画・協賛", 8: "社会的投資(ソーシャルビジネス)"
        },
        3: { // 心・精神性
          4: "マインドフルネスの確立と\n揺るぎない自己信頼",
          0: "朝20分の瞑想習慣", 1: "感謝日記 of 毎晩アウトプット", 2: "感情のセルフモニタリング", 3: "週末デジタルデトックス",
          5: "心のノイズを削ぎ落とす", 6: "聖典や名著からの学び", 7: "自然と調和する時間の確保", 8: "自己一致 of ライフワーク追求"
        },
        4: { // 人生の大目標
          4: "公益と利他をゴールに含む\n規律をカオスな世の中に広げる",
          0: "リベラルアーツと\nコーチングスキルの探求",
          1: "自律型組織 of 共創と\nビジネス of 好循環",
          2: "地域コミュニティ活性化と\n公益への持続的還元",
          3: "マインドフルネスの確立と\n揺るぎない自己信頼",
          5: "ウェルネス of 追求と\nベストパフォーマンス維持",
          6: "日常にパッションを取り入れ\n豊かな生き方を体現する",
          7: "持続可能な資産構築と\n公益還元の基盤設計",
          8: "愛に満ちた家庭環境と\n子供への100%伴走サポート"
        },
        5: { // 健康・身体
          4: "ウェルネス of 追求と\nベストパフォーマンス維持",
          0: "週3回のランニング＆ジム", 1: "毎日7時間の高品質睡眠", 2: "オーガニック・無添加食事", 3: "年1回の人間ドック徹底受診",
          5: "ストレッチでの柔軟性維持", 6: "呼吸法と整いサウナ習慣", 7: "水分補給と健康ログ記録", 8: "体幹・姿勢リセット調整"
        },
        6: { // 趣味・ライフワーク
          4: "日常にパッションを取り入れ\n豊かな生き方を体現する",
          0: "カメラを手に週末散策", 1: "週末ソフトテニスのサポート", 2: "アートや音楽に触れる日", 3: "ブログ等での創作表現",
          5: "未体験ジャンルへの挑戦", 6: "大自然でのキャンプ・冒険", 7: "気の合う仲間との語らい", 8: "感動アイデアノートの構築"
        },
        7: { // 財産・資産形成
          4: "持続可能な資産構築と\n公益還元の基盤設計",
          0: "インデックス投資 of 自動積立", 1: "ポートフォリオの定期精査", 2: "固定費・サブスクの最適化", 3: "新規収入源プロトタイピング",
          5: "金融史と経済心理の勉強", 6: "家族用ファイナンシャルプラン", 7: "公益信託への拠出準備", 8: "資産状況 of 月次可視化"
        },
        8: { // 家族・パートナーシップ
          4: "愛に満ちた家庭環境と\n子供への100%伴走サポート",
          0: "感謝と労いの日常的な言葉掛け", 1: "週末の家族だんらんディナー", 2: "パートナーとの対話時間の確保", 3: "子供のテニス試合 of 全力応援",
          5: "快適で整ったリビング空間", 6: "親族・両親への定期的連絡", 7: "記念日のパーソナルサプライズ", 8: "家族みんなで創る未来ビジョン"
        }
      };

      for (let b = 0; b < 9; b++) {
        cells[b] = {};
        for (let c = 0; c < 9; c++) {
          let initialText = "";
          if (!clean) {
            initialText = samples[b][c];
          } else {
            if (b === 4 && c === 4) initialText = "【人生の大目標】";
            else if (c === 4) initialText = `【中目標 ${b + 1}】`;
            else initialText = "";
          }

          cells[b][c] = {
            text: initialText,
            level: 0,
            memo: ""
          };
        }
      }
      return cells;
    };

    function App() {
      const [cells, setCells] = useState(() => {
        try {
          const saved = localStorage.getItem("mandala_rpg_cells_v3");
          if (saved) {
            const parsed = JSON.parse(saved);
            let isValid = true;
            for (let b = 0; b < 9; b++) {
              if (!parsed[b] || typeof parsed[b] !== 'object') { isValid = false; break; }
              for (let c = 0; c < 9; c++) {
                if (!parsed[b][c] || typeof parsed[b][c] !== 'object' || parsed[b][c].level === undefined) { isValid = false; break; }
              }
            }
            if (isValid) return parsed;
          }
        } catch (e) { console.error(e); }
        return createInitialCells();
      });

      const [projectName, setProjectName] = useState(() => {
        return localStorage.getItem("mandala_rpg_project_name_v3") || "ライフキャリア・クロニクル";
      });

      const [blockNames, setBlockNames] = useState(() => {
        try {
          const saved = localStorage.getItem("mandala_rpg_block_names_v3");
          if (saved) {
            const parsed = JSON.parse(saved);
            if (parsed && typeof parsed === 'object' && parsed[8]) return parsed;
          }
        } catch(e){}
        return { ...DEFAULT_BLOCK_NAMES };
      });

      const [blockHues, setBlockHues] = useState(() => {
        try {
          const saved = localStorage.getItem("mandala_rpg_block_hues_v3");
          if (saved) {
            const parsed = JSON.parse(saved);
            if (parsed && typeof parsed === 'object' && parsed[8] !== undefined) return parsed;
          }
        } catch(e){}
        return { 0: 165, 1: 215, 2: 190, 3: 275, 4: 345, 5: 105, 6: 38, 7: 48, 8: 325 };
      });
      
      const [selectedCell, setSelectedCell] = useState({ b: 4, c: 4 });
      const [zoomBlock, setZoomBlock] = useState(null); 
      
      const [isMobile, setIsMobile] = useState(false);
      const [isLandscape, setIsLandscape] = useState(false);
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);
      
      const [isDragging, setIsDragging] = useState(false);
      const [scrollOffset, setScrollOffset] = useState({ x: 0, y: 0 });
      const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
      const [scale, setScale] = useState(0.5); 
      
      const [printEconomy, setPrintEconomy] = useState(false);
      const [fullPrintMode, setFullPrintMode] = useState(false);
      const [editingCell, setEditingCell] = useState(null); 
      const [inlineText, setInlineText] = useState("");
      const [activePaletteBlock, setActivePaletteBlock] = useState(null);
      const [editingBlockNameIdx, setEditingBlockNameIdx] = useState(null);
      const [tempBlockName, setTempBlockName] = useState("");

      const [backupZoomBlock, setBackupZoomBlock] = useState(null);

      const [dialogState, setDialogState] = useState({ show: false, type: "", title: "", text: "", onConfirm: null });
      const [toastText, setToastText] = useState("");

      const dragStartPos = useRef({ x: 0, y: 0 });
      const isMoved = useRef(false);
      const boardContainerRef = useRef(null);

      const touchStartDistRef = useRef(0);
      const touchStartScaleRef = useRef(1);
      const isPinchingRef = useRef(false);
      const touchStartOffsetRef = useRef({ x: 0, y: 0 });
      const touchStartCenterRef = useRef({ x: 0, y: 0 });

      useEffect(() => { localStorage.setItem("mandala_rpg_cells_v3", JSON.stringify(cells)); }, [cells]);
      useEffect(() => { localStorage.setItem("mandala_rpg_project_name_v3", projectName); }, [projectName]);
      useEffect(() => { localStorage.setItem("mandala_rpg_block_names_v3", JSON.stringify(blockNames)); }, [blockNames]);
      useEffect(() => { localStorage.setItem("mandala_rpg_block_hues_v3", JSON.stringify(blockHues)); }, [blockHues]);

      const showToast = (msg) => { setToastText(msg); setTimeout(() => setToastText(""), 2500); };

      const handleResizeAndOrientation = () => {
        const width = window.innerWidth;
        const height = window.innerHeight;
        const isMobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const hasTouchScreen = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        const mobile = isMobileUA || (hasTouchScreen && width < 1024);
        const landscape = height < 550 && width > height;
        setIsMobile(mobile || landscape);
        setIsLandscape(landscape);
        if (!mobile && !landscape) { setIsSidebarOpen(true); } else { setIsSidebarOpen(false); }
      };

      const fitToScreen = useCallback(() => {
        if (!boardContainerRef.current) return;
        const containerWidth = boardContainerRef.current.clientWidth;
        const containerHeight = boardContainerRef.current.clientHeight;
        if (containerWidth < 50 || containerHeight < 50) return;
        const boardW = 1722; const boardH = 1137;
        const scaleX = containerWidth / boardW; const scaleY = containerHeight / boardH;
        const marginFactor = isMobile ? 0.96 : 0.94;
        const bestScale = Math.min(scaleX, scaleY) * marginFactor;
        const clampedScale = Math.max(0.12, Math.min(2.0, bestScale));
        const offsetX = (containerWidth - boardW * clampedScale) / 2;
        const offsetY = (containerHeight - boardH * clampedScale) / 2;
        setScale(clampedScale); setScrollOffset({ x: offsetX, y: offsetY });
      }, [isMobile]);

      useEffect(() => {
        handleResizeAndOrientation();
        window.addEventListener("resize", handleResizeAndOrientation);
        return () => window.removeEventListener("resize", handleResizeAndOrientation);
      }, []);

      useEffect(() => {
        if (!boardContainerRef.current) return;
        const observer = new ResizeObserver(() => { window.requestAnimationFrame(() => { fitToScreen(); }); });
        observer.observe(boardContainerRef.current);
        return () => observer.disconnect();
      }, [fitToScreen, isSidebarOpen, zoomBlock]);

      useEffect(() => {
        const board = boardContainerRef.current; if (!board) return;
        const handleWheel = (e) => {
          e.preventDefault();
          const zoomFactor = 1.06; let nextScale = scale;
          if (e.deltaY < 0) { nextScale = Math.min(2.0, scale * zoomFactor); } else { nextScale = Math.max(0.12, scale / zoomFactor); }
          if (nextScale === scale) return;
          const rect = board.getBoundingClientRect();
          const mouseX = e.clientX - rect.left; const mouseY = e.clientY - rect.top;
          const boardX = (mouseX - scrollOffset.x) / scale; const boardY = (mouseY - scrollOffset.y) / scale;
          const nextOffsetX = mouseX - boardX * nextScale; const nextOffsetY = mouseY - boardY * nextScale;
          setScale(nextScale); setScrollOffset({ x: nextOffsetX, y: nextOffsetY });
        };
        board.addEventListener('wheel', handleWheel, { passive: false });
        return () => { board.removeEventListener('wheel', handleWheel); };
      }, [scale, scrollOffset]);

      useEffect(() => {
        const container = boardContainerRef.current; if (!container) return;
        const handleTouchStart = (e) => {
          if (e.touches.length === 2) {
            e.preventDefault(); isPinchingRef.current = true; setIsDragging(false);
            const dist = getDistance(e.touches[0], e.touches[1]);
            touchStartDistRef.current = dist; touchStartScaleRef.current = scale;
            const center = getCenter(e.touches[0], e.touches[1]);
            touchStartCenterRef.current = center; touchStartOffsetRef.current = { ...scrollOffset };
          } else if (e.touches.length === 1 && !isPinchingRef.current) {
            handleDragStart(e.touches[0].clientX, e.touches[0].clientY, e.target);
          }
        };
        const handleTouchMove = (e) => {
          if (e.touches.length === 2 && isPinchingRef.current) {
            e.preventDefault(); const dist = getDistance(e.touches[0], e.touches[1]);
            const currentScale = touchStartScaleRef.current * (dist / touchStartDistRef.current);

                  {/* フッターコントロール */}
                  <div className="flex justify-between items-center pt-3 border-t border-slate-800/80">
                    <p className="text-[10px] text-slate-500 font-bold flex items-center gap-1">
                      <i className="fa-solid fa-circle-info"></i>
                      <span>ミニマップから全マスをその場でサクサク編集できます！</span>
                    </p>
                    <div className="flex gap-2">
                      <button
                        onClick={cancelInlineEdit}
                        className="bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs py-2 px-4 rounded-lg font-black transition-all border border-slate-700/60"
                      >
                        キャンセル
                      </button>
                      <button
                        onClick={saveInlineEdit}
                        className="bg-gradient-to-r from-cyan-500 to-emerald-500 hover:from-cyan-400 hover:to-emerald-400 text-white text-xs py-2 px-5 rounded-lg font-black transition-all shadow-lg active:scale-95"
                      >
                        決定 ＆ 保存
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
