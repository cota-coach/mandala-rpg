      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }

          0: "週3回のランニング＆ジム", 1: "毎日7時間の高品質睡眠", 2: "オーガニック・無添加食事", 3: "年1回の人間ドック徹底受診",

          0: "カメラを手に週末散策", 1: "週末ソフトテニスのサポート", 2: "アートや音楽に触れる日", 3: "ブログ等での創作表現",
          5: "未体験ジャンルへの挑戦", 6: "大自然でのキャンプ・冒険", 7: "気の合う仲間との語らい", 8: "感動アイデアノートの構築"

        },
        8: { // 家族・パートナーシップ
          4: "愛に満ちた家庭環境と\n子供への100%伴走サポート",
          0: "感謝と労いの日常的な言葉掛け", 1: "週末の家族だんらんディナー", 2: "パートナーとの対話時間の確保", 3: "子供のテニス試合の全力応援",

      for (let b = 0; b < 9; b++) {

          cells[b][c] = {
            text: samples[b][c] || `アクション ${b}-${c}`,

    // 完全にゼロからスタートするための白紙テンプレートセル
    const createBlankCells = (themes) => {
      const cells = {};
      for (let b = 0; b < 9; b++) {
        cells[b] = {};
        for (let c = 0; c < 9; c++) {
          let placeholder = "";
          if (b === 4 && c === 4) {
            placeholder = "【人生の大目標を設定】";
          } else if (c === 4) {
            placeholder = `【${themes[b].name}の中目標を設定】`;
          } else {
            placeholder = "";
          }
          cells[b][c] = {
            text: placeholder,
            level: 0,
            memo: ""
          };
        }
      }
      return cells;
    };

    function App() {
      // 状態管理
      const [cells, setCells] = useState(() => {
        try {
          const saved = localStorage.getItem("mandala_rpg_cells_v4");
          if (saved) {
            const parsed = JSON.parse(saved);
            if (parsed && parsed[4] && parsed[4][4]) return parsed;
          }
        } catch (e) {
          console.error("Failed to load cells from localStorage:", e);
        }
        return createInitialCells();
      });

      const [projectName, setProjectName] = useState(() => {
        return localStorage.getItem("mandala_rpg_project_name_v4") || "ライフキャリア・クロニクル";
      });

      // 各ブロックのテーマカラー色相設定
      const [blockHues, setBlockHues] = useState(() => {
        try {
          const savedHues = localStorage.getItem("mandala_rpg_block_hues_v4");
          if (savedHues) return JSON.parse(savedHues);
        } catch (e) {
          console.error("Failed to load hues from localStorage:", e);
        }
        const defaultHues = {};
        for (let key in DEFAULT_BLOCK_THEMES) {
          defaultHues[key] = DEFAULT_BLOCK_THEMES[key].hue;
        }
        return defaultHues;
      });

      // 各ブロックのタイトル名（自律編集可能なバランスホイール）
      const [blockThemes, setBlockThemes] = useState(() => {
        try {
          const savedThemes = localStorage.getItem("mandala_rpg_block_themes_v4");
          if (savedThemes) {
            const parsed = JSON.parse(savedThemes);
            if (parsed && parsed[0] && parsed[0].name) return parsed;
          }
        } catch (e) {
          console.error("Failed to load block themes:", e);
        }
        return DEFAULT_BLOCK_THEMES;
      });

      // ブロックタイトル（領域名）インライン編集用
      const [editingThemeIndex, setEditingThemeIndex] = useState(null); // null or bIndex
      const [themeInputText, setThemeInputText] = useState("");

      const [activePaletteIndex, setActivePaletteIndex] = useState(null);
      const [selectedCell, setSelectedCell] = useState({ b: 4, c: 4 });
      const [zoomBlock, setZoomBlock] = useState(null); 
      
      const [isDragging, setIsDragging] = useState(false);
      const [scrollOffset, setScrollOffset] = useState({ x: 0, y: 0 });
      const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
      const [scale, setScale] = useState(0.5); 
      
      const [printEconomy, setPrintEconomy] = useState(false);
      const [fullPrintMode, setFullPrintMode] = useState(false);

      const [editingCell, setEditingCell] = useState(null); 
      const [inlineText, setInlineText] = useState("");

      const [confirmModal, setConfirmModal] = useState(null); // null | 'reset' | 'clear'
      const [toast, setToast] = useState(null); // null | { text, type }

      const dragStartPos = useRef({ x: 0, y: 0 });
      const isMoved = useRef(false);
      const boardContainerRef = useRef(null);

      // マルチタッチ・ピンチズーム用
      const touchStartDistRef = useRef(0);
      const touchStartScaleRef = useRef(1);
      const isPinchingRef = useRef(false);
      const touchStartOffsetRef = useRef({ x: 0, y: 0 });
      const touchStartCenterRef = useRef({ x: 0, y: 0 });

      // 自動保存
      useEffect(() => {
        localStorage.setItem("mandala_rpg_cells_v4", JSON.stringify(cells));
      }, [cells]);

      useEffect(() => {
        localStorage.setItem("mandala_rpg_project_name_v4", projectName);
      }, [projectName]);

      useEffect(() => {
        localStorage.setItem("mandala_rpg_block_hues_v4", JSON.stringify(blockHues));
      }, [blockHues]);

      useEffect(() => {
        localStorage.setItem("mandala_rpg_block_themes_v4", JSON.stringify(blockThemes));
      }, [blockThemes]);

      useEffect(() => {
        const handleOutsideClick = (e) => {
          if (!e.target.closest('.color-picker-container')) {
            setActivePaletteIndex(null);
          }
        };
        window.addEventListener('click', handleOutsideClick);
        return () => window.removeEventListener('click', handleOutsideClick);
      }, []);

      useEffect(() => {
        if (toast) {
          const timer = setTimeout(() => setToast(null), 3500);
          return () => clearTimeout(timer);
        }
      }, [toast]);

      const showToast = (text, type = 'success') => {
        setToast({ text, type });
      };

      // スマートスケーリングフィット
      const fitToScreen = () => {
        if (!boardContainerRef.current) return;
        const containerWidth = boardContainerRef.current.clientWidth;
        const containerHeight = boardContainerRef.current.clientHeight;
        
        const boardW = 1722;
        const boardH = 1137;

        const scaleX = containerWidth / boardW;
        const scaleY = containerHeight / boardH;
        const bestScale = Math.min(scaleX, scaleY) * 0.94;

        const clampedScale = Math.max(0.15, Math.min(2.0, bestScale));
        
        const offsetX = (containerWidth - boardW * clampedScale) / 2;
        const offsetY = (containerHeight - boardH * clampedScale) / 2;

        setScale(clampedScale);
        setScrollOffset({ x: offsetX, y: offsetY });
      };

      useEffect(() => {
        setTimeout(fitToScreen, 150);
        window.addEventListener("resize", fitToScreen);
        return () => window.removeEventListener("resize", fitToScreen);
      }, [zoomBlock]);

      // マウスホイールズーム
      useEffect(() => {
        const board = boardContainerRef.current;
        if (!board) return;

        const handleWheel = (e) => {
          e.preventDefault();
          const zoomFactor = 1.08;
          let nextScale = scale;
          
          if (e.deltaY < 0) {
            nextScale = Math.min(2.0, scale * zoomFactor);
          } else {
            nextScale = Math.max(0.15, scale / zoomFactor);
          }

          if (nextScale === scale) return;

          const rect = board.getBoundingClientRect();
          const mouseX = e.clientX - rect.left;
          const mouseY = e.clientY - rect.top;

          const boardX = (mouseX - scrollOffset.x) / scale;
          const boardY = (mouseY - scrollOffset.y) / scale;

          const nextOffsetX = mouseX - boardX * nextScale;
          const nextOffsetY = mouseY - boardY * nextScale;

          setScale(nextScale);
          setScrollOffset({ x: nextOffsetX, y: nextOffsetY });
        };

        board.addEventListener('wheel', handleWheel, { passive: false });
        return () => {
          board.removeEventListener('wheel', handleWheel);
        };
      }, [scale, scrollOffset]);

      const currentCellData = cells[selectedCell.b][selectedCell.c];

      // ドラッグ開始
      const handleDragStart = (clientX, clientY, target) => {
        if (
          target.closest('.no-drag') || 
          target.closest('.color-picker-container') ||
          target.tagName === 'INPUT' || 
          target.tagName === 'TEXTAREA' || 
          target.tagName === 'SELECT' || 
          target.tagName === 'BUTTON'
        ) {
          return;
        }

        setIsDragging(true);
        isMoved.current = false;
        dragStartPos.current = { x: clientX, y: clientY };
        setDragStart({ x: clientX - scrollOffset.x, y: clientY - scrollOffset.y });
      };

      // ドラッグ移動中
      const handleDragMove = (clientX, clientY) => {
        if (!isDragging) return;
        
        const dx = Math.abs(clientX - dragStartPos.current.x);
        const dy = Math.abs(clientY - dragStartPos.current.y);
        
        if (dx > 4 || dy > 4) {
          isMoved.current = true;
        }

        setScrollOffset({
          x: clientX - dragStart.x,
          y: clientY - dragStart.y
        });
      };

      const handleDragEnd = () => {
        setIsDragging(false);
      };

      const onMouseDown = (e) => {
        handleDragStart(e.clientX, e.clientY, e.target);
      };

      const onMouseMove = (e) => {
        handleDragMove(e.clientX, e.clientY);
      };

      // タッチイベント関係
      const onTouchStart = (e) => {
        if (e.touches.length === 2) {
          isPinchingRef.current = true;
          setIsDragging(false);

          const dist = getDistance(e.touches[0], e.touches[1]);
          touchStartDistRef.current = dist;
          touchStartScaleRef.current = scale;
          
          const center = getCenter(e.touches[0], e.touches[1]);
          touchStartCenterRef.current = center;
          touchStartOffsetRef.current = { ...scrollOffset };
        } else if (e.touches.length === 1 && !isPinchingRef.current) {
          const touch = e.touches[0];
          handleDragStart(touch.clientX, touch.clientY, e.target);
        }
      };

      const onTouchMove = (e) => {
        if (e.touches.length === 2 && isPinchingRef.current) {
          e.preventDefault();
          const dist = getDistance(e.touches[0], e.touches[1]);
          const currentScale = touchStartScaleRef.current * (dist / touchStartDistRef.current);
          const clampedScale = Math.max(0.15, Math.min(2.0, currentScale));

          const container = boardContainerRef.current;
          if (!container) return;
          const rect = container.getBoundingClientRect();
          const center = getCenter(e.touches[0], e.touches[1]);

          const centerX = center.x - rect.left;
          const centerY = center.y - rect.top;

          const startCenterX = touchStartCenterRef.current.x - rect.left;
          const startCenterY = touchStartCenterRef.current.y - rect.top;

          const boardX = (startCenterX - touchStartOffsetRef.current.x) / touchStartScaleRef.current;
          const boardY = (startCenterY - touchStartOffsetRef.current.y) / touchStartScaleRef.current;

          const nextOffsetX = centerX - boardX * clampedScale;
          const nextOffsetY = centerY - boardY * clampedScale;

          setScale(clampedScale);
          setScrollOffset({ x: nextOffsetX, y: nextOffsetY });
        } else if (e.touches.length === 1 && !isPinchingRef.current) {
          const touch = e.touches[0];
          handleDragMove(touch.clientX, touch.clientY);
        }
      };

      const onTouchEnd = (e) => {
        if (e.touches.length < 2) {
          isPinchingRef.current = false;
        }
        handleDragEnd();
      };

      const changeScaleStep = (delta) => {
        const container = boardContainerRef.current;
        if (!container) return;
        
        const rect = container.getBoundingClientRect();
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        const boardX = (centerX - scrollOffset.x) / scale;
        const boardY = (centerY - scrollOffset.y) / scale;

        const nextScale = Math.max(0.15, Math.min(2.0, scale + delta));
        const nextOffsetX = centerX - boardX * nextScale;
        const nextOffsetY = centerY - boardY * nextScale;

        setScale(nextScale);
        setScrollOffset({ x: nextOffsetX, y: nextOffsetY });
      };

      // 1レベル刻みのリニア・カラーエボリューション
      const getCellColorAndStyle = (b, c, level) => {
        if (printEconomy) {
          if (b === 4 && c === 4) {
            return {
              className: "border-2 border-black bg-slate-100 text-black",
              style: {}
            };
          }
          return {
            className: "border border-slate-300 bg-white text-black",
            style: {}
          };
        }

        const hue = blockHues[b] !== undefined ? blockHues[b] : blockThemes[b].hue;

        // レベル0：完全未開拓。パレット本来の単色の深み
        if (level === 0) {
          return {
            className: "border border-slate-800/80 text-slate-400 shadow-inner",
            style: {
              background: `hsl(${hue}, 30%, 14%)`
            }
          };
        }

        // レベル100：最高峰オーロラ
        if (level === 100) {
          return {
            className: "animate-aurora border-[3px] border-yellow-400 shadow-[0_0_20px_rgba(234,179,8,0.7)] text-slate-900 font-black relative overflow-hidden",
            style: {
              background: `linear-gradient(135deg, hsl(${hue}, 95%, 65%), hsl(${(hue + 120) % 360}, 95%, 70%), hsl(${(hue + 240) % 360}, 95%, 65%))`,
            }
          };
        }

        // リニア変化
        let bgStyle = {};
        let className = "border-slate-800 text-slate-100";

        if (level <= 30) {
          const progress = (level - 1) / 29;
          const s = 25 + progress * 15; 
          const l = 18 + progress * 5;  
          bgStyle = { background: `hsl(${hue}, ${s}%, ${l}%)` };
          className = "border border-slate-700/50 shadow-inner";
        } else if (level <= 60) {
          const progress = (level - 31) / 29;
          const s = 40 + progress * 20; 
          const l = 23 + progress * 5;  
          bgStyle = {
            background: `linear-gradient(135deg, hsl(${hue}, ${s}%, ${l}%), #1e293b)`
          };
          className = "border-[1.5px] border-slate-400/60 shadow-[0_0_12px_rgba(148,163,184,0.2)]";
        } else if (level <= 90) {
          const progress = (level - 61) / 29;
          const s = 60 + progress * 25; 
          const l = 28 - progress * 5;  
          bgStyle = {
            background: `linear-gradient(135deg, hsl(${hue}, ${s}%, ${l}%), #713f12)`
          };
          className = "border-2 border-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.25)] font-semibold";
        } else {
          const progress = (level - 91) / 8;
          const s = 85 + progress * 13; 
          const l = 23 + progress * 5;  
          bgStyle = {
            background: `linear-gradient(135deg, hsl(${hue}, ${s}%, ${l}%), #155e75, hsl(${(hue + 45) % 360}, 95%, 45%))`
          };
          className = "border-2 border-cyan-400 shadow-[0_0_18px_rgba(6,182,212,0.4)] font-extrabold animate-pulse-slow";
        }

        return { className, style: bgStyle };
      };

      // レベル自動同期＆波紋状自動ロールアップ
      const updateCellData = (b, c, updates) => {
        setCells(prev => {
          const next = JSON.parse(JSON.stringify(prev));
          next[b][c] = { ...next[b][c], ...updates };

          // テキストやメモが更新された場合のシンクロ
          if (b !== 4 && c === 4) {
            next[4][b].text = next[b][4].text;
            next[4][b].memo = next[b][4].memo;
          } else if (b === 4 && c !== 4) {
            next[c][4].text = next[4][c].text;
            next[c][4].memo = next[4][c].memo;
          }

          // 周辺8マスのレベル平均を中目標へ集約
          for (let i = 0; i < 9; i++) {
            if (i === 4) continue;
            let sum = 0;
            for (let j = 0; j < 9; j++) {
              if (j === 4) continue;
              sum += next[i][j].level;
            }
            const avg = Math.round(sum / 8);

            next[i][4].level = avg;
            next[4][i].level = avg;
          }

          // 大目標のロールアップ
          let centerSum = 0;
          for (let i = 0; i < 9; i++) {
            if (i === 4) continue;
            centerSum += next[4][i].level;
          }
          const centerAvg = Math.round(centerSum / 8);

          if (next[4][4].level !== centerAvg) {
            if (centerAvg === 100) {
              setTimeout(() => triggerConfettiShow(), 300);
            }
          }
          next[4][4].level = centerAvg;

          return next;
        });

        if (updates.level === 100) {
          triggerConfettiShow();
        }
      };

      const triggerConfettiShow = () => {
        if (typeof confetti === 'function') {
          confetti({ particleCount: 200, spread: 90, origin: { y: 0.55 } });
        }
      };

      const adjustLevel = (b, c, delta) => {
        if (b === 4 || c === 4) return; 
        const currentLvl = cells[b][c].level;
        const nextLvl = Math.max(0, Math.min(100, currentLvl + delta));
        updateCellData(b, c, { level: nextLvl });
      };

      // テキスト編集開始
      const startInlineEdit = (b, c, e) => {
        if (e) e.stopPropagation();
        setEditingCell({ b, c });
        setInlineText(cells[b][c].text);
      };

      const saveInlineEdit = () => {
        if (editingCell) {
          updateCellData(editingCell.b, editingCell.c, { text: inlineText });
          setEditingCell(null);
        }
      };

      // ブロックタイトル（領域名）のインライン編集開始
      const startThemeEdit = (bIndex, e) => {
        e.stopPropagation();
        setEditingThemeIndex(bIndex);
        setThemeInputText(blockThemes[bIndex].name);
      };

      const saveThemeEdit = (bIndex) => {
        if (editingThemeIndex !== null) {
          setBlockThemes(prev => ({
            ...prev,
            [bIndex]: { ...prev[bIndex], name: themeInputText }
          }));
          setEditingThemeIndex(null);
        }
      };

      // バックアップエクスポート
      const exportData = () => {
        const dataStr = JSON.stringify({ projectName, cells, blockHues, blockThemes }, null, 2);
        const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
        const exportFileDefaultName = `${projectName}_mandala_rpg_backup.json`;
        
        const linkElement = document.createElement('a');
        linkElement.setAttribute('href', dataUri);
        linkElement.setAttribute('download', exportFileDefaultName);
        linkElement.click();
        showToast("バックアップ用JSONファイルをダウンロードしました！");
      };

      // バックアップインポート
      const importData = (e) => {
        const fileReader = new FileReader();
        if (e.target.files && e.target.files[0]) {
          fileReader.readAsText(e.target.files[0], "UTF-8");
          fileReader.onload = (event) => {
            try {
              const parsed = JSON.parse(event.target.result);
              if (parsed.cells) {
                setCells(parsed.cells);
                if (parsed.projectName) setProjectName(parsed.projectName);
                if (parsed.blockHues) setBlockHues(parsed.blockHues);
                if (parsed.blockThemes) setBlockThemes(parsed.blockThemes);
                showToast("バックアップデータの読み込みに成功しました！", "success");
              } else {
                showToast("無効なファイル形式です。", "error");
              }
            } catch (err) {
              showToast("インポート中にエラーが発生しました。", "error");
            }
          };
        }
      };

      const overallLevelProgress = useMemo(() => {
        return cells[4][4].level; 
      }, [cells]);

      const getRankTitle = (lvl) => {
        if (lvl === 0) return { title: "🌱 始まりの種子", color: "text-emerald-400", bg: "bg-emerald-400/10" };
        if (lvl <= 30) return { title: "ブロンズ・開拓者", color: "text-amber-500", bg: "bg-amber-500/10" };
        if (lvl <= 60) return { title: "シルバー・探索者", color: "text-slate-300", bg: "bg-slate-300/10" };
        if (lvl <= 90) return { title: "ゴールド・覇者", color: "text-yellow-400", bg: "bg-yellow-400/10" };
        if (lvl <= 99) return { title: "プラチナ・マスター", color: "text-cyan-400", bg: "bg-cyan-400/10" };
        return { title: "👑レジェンド・創造主", color: "text-yellow-300 animate-pulse", bg: "bg-gradient-to-r from-yellow-500/20 to-red-500/20" };
      };

      const currentRank = getRankTitle(overallLevelProgress);

      // バランスホイール用の8大領域平均算出ロジック (自律編集された名称とリアルタイム連動)
      const blockAverages = useMemo(() => {
        return [0, 1, 2, 3, 5, 6, 7, 8].map(bIndex => {
          let sum = 0;
          for (let c = 0; c < 9; c++) {
            if (c === 4) continue;
            sum += cells[bIndex][c].level;
          }
          return {
            id: bIndex,
            name: blockThemes[bIndex].name,
            icon: blockThemes[bIndex].icon,
            hue: blockHues[bIndex] !== undefined ? blockHues[bIndex] : blockThemes[bIndex].hue,
            avg: Math.round(sum / 8)
          };
        });
      }, [cells, blockHues, blockThemes]);

      // 最もレベルの高い領域と低い領域の分析
      const analysis = useMemo(() => {
        if (blockAverages.length === 0) return { max: null, min: null };
        let maxSec = blockAverages[0];
        let minSec = blockAverages[0];
        
        blockAverages.forEach(sec => {
          if (sec.avg > maxSec.avg) maxSec = sec;
          if (sec.avg < minSec.avg) minSec = sec;
        });

        return { max: maxSec, min: minSec };
      }, [blockAverages]);

      return (
        <div class="flex h-full w-full overflow-hidden select-none">
          
          {/* 左側詳細サイドパネル */}
          <div class={`w-96 min-w-[384px] bg-[#0d1424] border-r border-slate-800 flex flex-col h-full z-10 no-print transition-all duration-300 ${fullPrintMode ? 'hidden' : ''}`}>
            
            {/* パネルヘッダー */}
            <div class="p-5 border-b border-slate-800 flex flex-col gap-3">
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-gem text-yellow-500 text-xl"></i>
                <input
                  type="text"
                  value={projectName}
                  onChange={(e) => setProjectName(e.target.value)}
                  class="bg-transparent font-bold text-lg text-slate-100 focus:outline-none border-b border-transparent focus:border-yellow-500/50 w-full px-1"
                  placeholder="プロジェクト名"
                />
              </div>
              
              {/* 全体プログレス */}
              <div class="bg-slate-900/90 p-3 rounded-xl border border-slate-800/80">
                <div class="flex justify-between items-center text-xs mb-1.5">
                  <span class="text-slate-400 font-medium">総合目標ランク</span>
                  <span class={`font-bold px-2 py-0.5 rounded ${currentRank.bg} ${currentRank.color}`}>{currentRank.title}</span>
                </div>
                <div class="flex items-center gap-3">
                  <div class="w-full bg-slate-800 rounded-full h-3 overflow-hidden border border-slate-700/50">
                    <div 
                      class="bg-gradient-to-r from-amber-500 via-yellow-400 to-cyan-400 h-full rounded-full transition-all duration-500"
                      style={{ width: `${overallLevelProgress}%` }}
                    ></div>
                  </div>
                  <span class="text-sm font-black text-yellow-400 min-w-[45px] text-right font-orbitron">Lv.{overallLevelProgress}</span>
                </div>
              </div>
            </div>

            {/* 詳細編集エリア */}
            <div class="flex-grow overflow-y-auto p-5 space-y-4 no-scrollbar">
              <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-800">
                <div class="flex justify-between items-start mb-3">
                  <div>
                    <span class="text-[10px] text-slate-400 font-bold tracking-wider uppercase bg-slate-800 px-2 py-1 rounded">
                      BLOCK {selectedCell.b + 1} - CELL {selectedCell.c + 1}
                    </span>
                    <h3 class="text-sm font-bold text-slate-200 mt-2 flex items-center gap-2">
                      <i class={`fa-solid ${blockThemes[selectedCell.b].icon} text-slate-400`}></i>
                      {blockThemes[selectedCell.b].name}
                    </h3>
                  </div>
                  <div class="text-right">
                    <span class="text-[10px] text-slate-400 block">現在のレベル</span>
                    <span class="text-2xl font-black text-yellow-400 font-orbitron">Lv.{currentCellData.level}</span>
                  </div>
                </div>

                {/* 改行対応テキスト入力 */}
                <div class="space-y-1.5">
                  <label class="text-[11px] text-slate-400 font-semibold block">マス目テキスト (改行反映)</label>
                  <textarea
                    value={currentCellData.text}
                    onChange={(e) => updateCellData(selectedCell.b, selectedCell.c, { text: e.target.value })}
                    rows={3}
                    class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-xs text-slate-200 focus:outline-none focus:border-yellow-500 font-medium whitespace-pre-wrap leading-relaxed"
                    placeholder="マスの目標やアクションを入力してください..."
                  />
                </div>

                {/* レベル調整コントローラー */}
                <div class="mt-4 pt-4 border-t border-slate-800/80 space-y-3">
                  <div class="flex justify-between items-center">
                    <span class="text-[11px] text-slate-400 font-semibold">
                      レベル成長調整
                      {(selectedCell.b === 4 || selectedCell.c === 4) && <span class="text-red-400 ml-1.5">(自動集計対象マス)</span>}
                    </span>
                  </div>
                  
                  <div class="flex items-center gap-2">
                    <button
                      onClick={() => adjustLevel(selectedCell.b, selectedCell.c, -10)}
                      disabled={selectedCell.b === 4 || selectedCell.c === 4}
                      class="bg-slate-800 hover:bg-slate-700 disabled:opacity-40 text-xs px-2.5 py-1.5 rounded text-slate-300 font-bold transition-all"
                    >
                      -10
                    </button>
                    <button
                      onClick={() => adjustLevel(selectedCell.b, selectedCell.c, -1)}
                      disabled={selectedCell.b === 4 || selectedCell.c === 4}
                      class="bg-slate-800 hover:bg-slate-700 disabled:opacity-40 text-xs px-2.5 py-1.5 rounded text-slate-300 font-bold transition-all"
                    >
                      -1
                    </button>
                    
                    <input
                      type="range"
                      min="0"
                      max="100"
                      value={currentCellData.level}
                      onChange={(e) => updateCellData(selectedCell.b, selectedCell.c, { level: parseInt(e.target.value) })}
                      disabled={selectedCell.b === 4 || selectedCell.c === 4}
                      class="w-full accent-yellow-500 h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer disabled:opacity-40"
                    />

                    <button
                      onClick={() => adjustLevel(selectedCell.b, selectedCell.c, 1)}
                      disabled={selectedCell.b === 4 || selectedCell.c === 4}
                      class="bg-slate-800 hover:bg-slate-700 disabled:opacity-40 text-xs px-2.5 py-1.5 rounded text-slate-300 font-bold transition-all"
                    >
                      +1
                    </button>
                    <button
                      onClick={() => adjustLevel(selectedCell.b, selectedCell.c, 10)}
                      disabled={selectedCell.b === 4 || selectedCell.c === 4}
                      class="bg-slate-800 hover:bg-slate-700 disabled:opacity-40 text-xs px-2.5 py-1.5 rounded text-slate-300 font-bold transition-all"
                    >
                      +10
                    </button>
                  </div>
                </div>
              </div>

              {/* アプローチ詳細 */}
              <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-800 space-y-2.5">
                <label class="text-[11px] text-slate-400 font-semibold block flex items-center gap-1.5">
                  <i class="fa-solid fa-pen-nib text-cyan-400"></i>
                  アプローチ詳細・行動計画メモ
                </label>
                <textarea
                  value={currentCellData.memo || ""}
                  onChange={(e) => updateCellData(selectedCell.b, selectedCell.c, { memo: e.target.value })}
                  rows={3}
                  class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-xs text-slate-300 focus:outline-none focus:border-cyan-500 font-medium leading-relaxed"
                  placeholder="このマスのレベルアップ条件、具体的なタスク、日々の振り返りなど..."
                />
              </div>

              {/* バランスホイール・調和度アドバイザー（自律連動） */}
              <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-800 space-y-3.5">
                <span class="text-[11px] text-slate-400 font-semibold block flex items-center gap-1.5 border-b border-slate-800/60 pb-1.5">
                  <i class="fa-solid fa-chart-pie text-indigo-400"></i>
                  調和度分析（自律インジケーター）
                </span>
                
                {/* 8領域のリアルタイムステータス */}
                <div class="grid grid-cols-2 gap-2 text-[10px]">
                  {blockAverages.map(sec => (
                    <div key={sec.id} class="bg-slate-950/40 p-1.5 rounded border border-slate-800/40 flex flex-col justify-between h-11">
                      <div class="flex justify-between items-center mb-0.5">
                        <span class="text-slate-400 truncate max-w-[100px] flex items-center gap-1" title={sec.name}>
                          <i class={`fa-solid ${sec.icon} text-slate-500 text-[8px]`}></i>
                          {sec.name}
                        </span>
                        <span class="font-bold text-yellow-500 font-orbitron">{sec.avg}%</span>
                      </div>
                      <div class="w-full bg-slate-800 h-1 rounded-full overflow-hidden">
                        <div class="h-full rounded-full transition-all duration-300" style={{ width: `${sec.avg}%`, backgroundColor: `hsl(${sec.hue}, 80%, 50%)` }}></div>
                      </div>
                    </div>
                  ))}
                </div>

                {/* コーチングレコメンドアドバイス */}
                {analysis.max && analysis.min && (
                  <div class="bg-slate-950/60 p-2.5 rounded-lg border border-slate-800/60 text-[10px] space-y-1.5 leading-relaxed">
                    <div class="flex items-center gap-1.5 text-emerald-400 font-bold">
                      <i class="fa-solid fa-circle-check text-[9px]"></i>
                      現在の圧倒的強み: {analysis.max.name} (Lv.{analysis.max.avg})
                    </div>
                    <div class="flex items-center gap-1.5 text-cyan-400 font-bold">
                      <i class="fa-solid fa-compass text-[9px]"></i>
                      次の重点開拓目標: {analysis.min.name} (Lv.{analysis.min.avg})
                    </div>
                    <p class="text-slate-400 italic text-[9px]">
                      {analysis.max.id === analysis.min.id || (analysis.max.avg === 0 && analysis.min.avg === 0)
                        ? "すべての領域が等しく始まりを待っています。まずは気になる小さなアクションを1歩進めましょう！"
                        : `「${analysis.max.name}」の推進力は素晴らしい状態です。この推進力を活かし、まだ成長の余白が大きい「${analysis.min.name}」の行動を1つでも着手すると、全体の調和好循環がさらに加速します！`
                      }
                    </p>
                  </div>
                )}
              </div>
            </div>

            {/* システムバックアップ・リセット (安全設計) */}
            <div class="p-4 border-t border-slate-800 bg-slate-950/80 space-y-3">
              <div class="grid grid-cols-2 gap-2">
                <button
                  onClick={exportData}
                  class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-[11px] py-2 px-3 rounded font-bold flex items-center justify-center gap-1.5 transition-all border border-slate-700"
                >
                  <i class="fa-solid fa-file-export"></i>
                  バックアップ
                </button>

                                type="text"
                                value={themeInputText}
                                onChange={(e) => setThemeInputText(e.target.value)}

                                onDoubleClick={(e) => startThemeEdit(bIndex, e)}

                                <i class={`fa-solid ${theme.icon} ${printEconomy ? 'text-black' : 'text-slate-400'} text-[10px]`}></i>

                                    setActivePaletteIndex(activePaletteIndex === bIndex ? null : bIndex);

                                  } else {
                                    setSelectedCell({ b: bIndex, c: cIndex });
                                  }

                                onDoubleClick={(e) => {
                                  if (isMoved.current) return;
                                  startInlineEdit(bIndex, cIndex, e);

                                      {cellData.text}

                                        cy="12"

                                        className="transition-all duration-300"

                                        <i class="fa-solid fa-crown"></i>
                                      </div>

                                </div>

                                {!isBlockCenter && !printEconomy && !isEditingThisCell && (

                                    <button
                                      onClick={(e) => {
                                        e.stopPropagation();
                                        adjustLevel(bIndex, cIndex, -1);
                                      }}

                                      title="レベルを1下げる"
                                    >
                                      <i class="fa-solid fa-minus text-[10px]"></i>
                                    </button>
                                    
                                    <button
                                      onClick={(e) => {
                                        e.stopPropagation();
                                        startInlineEdit(bIndex, cIndex, e);
                                      }}
                                      class="flex flex-col items-center justify-center text-slate-300 hover:text-yellow-400 transition-colors py-1 px-2 rounded-lg hover:bg-slate-850 border border-transparent hover:border-slate-700"

                                    >
                                      <i class="fa-solid fa-pen-to-square text-xs mb-0.5"></i>
                                      <span class="text-[7px] font-bold tracking-wider leading-none">EDIT</span>
                                    </button>

                                      onClick={(e) => {
                                        e.stopPropagation();
                                        adjustLevel(bIndex, cIndex, 1);

                                      class="w-7 h-7 rounded-full bg-slate-800 hover:bg-emerald-600 hover:scale-105 active:scale-95 text-white font-bold flex items-center justify-center transition-all border border-slate-700"

                                    >
                                      <i class="fa-solid fa-plus text-[10px]"></i>
                                    </button>
                                  </div>

                  <i className={`fa-solid ${confirmModal === 'reset' ? 'fa-rotate-left text-yellow-500' : 'fa-eraser text-red-500'}`}></i>
                  {confirmModal === 'reset' ? 'デモデータに復元しますか？' : '白紙（ゼロ）から開始しますか？'}
                </h4>
                <p className="text-xs text-slate-300 leading-relaxed mb-5">

                    ? '現在入力されているすべてのデータ（ブロックテーマを含む）が上書きされ、デフォルトの傑作コーチングプランに復元されます。' 
                    : 'すべてのテキストとブロックテーマ名がクリアされ、プレーンな「エリア1」「エリア2」といった自由編集に適した完全な白紙にリセットされます。'}
                </p>
                <div className="flex justify-end gap-2.5">
                  <button
                    onClick={() => setConfirmModal(null)}
                    className="bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs px-4 py-2 rounded-lg font-bold transition-all"

                  </button>

                    onClick={() => {
                      if (confirmModal === 'reset') {
                        setCells(createInitialCells());
                        setBlockThemes(DEFAULT_BLOCK_THEMES);
                        setProjectName("ライフキャリア・クロニクル");
                        setSelectedCell({ b: 4, c: 4 });
                        showToast("デフォルトのコーチングデータを復元しました！");
                      } else {

                        const blankThemes = {};
                        for (let b = 0; b < 9; b++) {
                          blankThemes[b] = {
                            name: b === 4 ? "メインテーマ" : `エリア ${b + 1}`,
                            hue: DEFAULT_BLOCK_THEMES[b].hue,
                            icon: b === 4 ? "fa-crown" : "fa-crosshairs",
                            desc: "自由に入力してください"
                          };

                        setBlockThemes(blankThemes);
                        setCells(createBlankCells(blankThemes));
                        setProjectName("新規マンダラプロジェクト");
                        setSelectedCell({ b: 4, c: 4 });
                        showToast("完全な白紙シートを作成しました！Lv.0から開拓しよう！");
                      }
                      setConfirmModal(null);
                      setTimeout(fitToScreen, 100);
                    }}
                    className={`text-xs px-4 py-2 rounded-lg font-bold transition-all text-white ${
                      confirmModal === 'reset' ? 'bg-yellow-600 hover:bg-yellow-500' : 'bg-red-600 hover:bg-red-500'

                  >
                    実行する

              toast.type === 'success' 
                ? 'bg-slate-900 border-emerald-500/50 text-emerald-400' 
                : 'bg-slate-900 border-red-500/50 text-red-400'
            }`}>
              <i className={`fa-solid ${toast.type === 'success' ? 'fa-circle-check text-emerald-500' : 'fa-triangle-exclamation text-red-500'}`}></i>
              <span className="font-bold text-xs">{toast.text}</span>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
